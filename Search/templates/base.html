<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Search Engine{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --ink: #172033;
            --muted: #687389;
            --line: #dde5ef;
            --surface: #ffffff;
            --surface-soft: #f6f8fc;
            --brand: #2268ff;
            --brand-deep: #163ca8;
            --accent: #12a594;
            --warm: #ffb84d;
        }

        * {
            letter-spacing: 0;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(34, 104, 255, 0.12), rgba(18, 165, 148, 0.08) 42%, rgba(255, 184, 77, 0.12)),
                var(--surface-soft);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-nav {
            background: rgba(255, 255, 255, 0.86);
            border-bottom: 1px solid rgba(221, 229, 239, 0.9);
            backdrop-filter: blur(14px);
        }

        .navbar-brand {
            color: var(--ink);
            font-weight: 800;
        }

        .navbar-brand:hover {
            color: var(--brand);
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            display: inline-grid;
            place-items: center;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            border-radius: 8px;
        }

        .nav-action {
            border-radius: 8px;
            font-weight: 700;
            padding: 0.55rem 0.85rem;
        }

        .nav-user {
            color: var(--muted);
            font-weight: 600;
        }

        .content-wrap {
            flex: 1;
        }

        .glass-panel,
        .result-card,
        .auth-card,
        .detail-card,
        .history-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(221, 229, 239, 0.95);
            border-radius: 8px;
            box-shadow: 0 18px 55px rgba(25, 37, 65, 0.08);
        }

        .hero-title {
            max-width: 780px;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            line-height: 0.96;
            font-weight: 900;
        }

        .hero-copy {
            max-width: 620px;
            color: var(--muted);
            font-size: 1.08rem;
        }

        .search-panel {
            padding: 0.6rem;
        }

        .search-input {
            border: 0;
            min-height: 64px;
            padding-left: 1.25rem;
            font-size: 1.05rem;
            background: transparent;
        }

        .search-input:focus {
            box-shadow: none;
        }

        .btn-brand {
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand-deep));
            border: 0;
            border-radius: 8px;
            font-weight: 800;
            padding-inline: 1.35rem;
        }

        .btn-brand:hover {
            color: #fff;
            transform: translateY(-1px);
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--brand-deep);
            background: rgba(34, 104, 255, 0.09);
            border: 1px solid rgba(34, 104, 255, 0.14);
            border-radius: 999px;
            padding: 0.45rem 0.75rem;
            font-weight: 800;
        }

        .result-card {
            padding: 1.25rem;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 60px rgba(25, 37, 65, 0.12);
        }

        .result-title {
            color: var(--ink);
            font-weight: 850;
        }

        .result-title:hover {
            color: var(--brand);
        }

        .text-muted-custom {
            color: var(--muted);
        }

        .empty-state {
            border: 1px dashed rgba(34, 104, 255, 0.25);
            border-radius: 8px;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.7);
        }

        .auth-card {
            padding: 2rem;
        }

        .auth-card form p {
            margin-bottom: 1rem;
        }

        .auth-card label {
            display: block;
            margin-bottom: 0.35rem;
            color: var(--muted);
            font-weight: 700;
        }

        .auth-card input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.78rem 0.9rem;
        }

        .detail-card {
            padding: clamp(1.4rem, 4vw, 2.5rem);
        }

        .document-body {
            color: #2e3b4f;
            font-size: 1.08rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .history-card {
            padding: 1rem;
        }

        .icon-badge {
            width: 42px;
            height: 42px;
            display: inline-grid;
            place-items: center;
            color: var(--brand-deep);
            background: rgba(34, 104, 255, 0.1);
            border-radius: 8px;
            flex: 0 0 auto;
        }

        .site-footer {
            color: var(--muted);
            border-top: 1px solid rgba(221, 229, 239, 0.8);
            background: rgba(255, 255, 255, 0.7);
        }

        .pagination .page-link {
            color: var(--brand-deep);
            border-color: var(--line);
            font-weight: 700;
        }

        .pagination .active .page-link {
            background: var(--brand);
            border-color: var(--brand);
        }

        @media (max-width: 575.98px) {
            .nav-actions {
                width: 100%;
                margin-top: 0.8rem;
            }

            .nav-action {
                flex: 1;
            }

            .search-panel .input-group {
                gap: 0.6rem;
            }

            .search-input,
            .search-panel .btn {
                width: 100%;
                border-radius: 8px !important;
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <nav class="navbar navbar-expand-lg site-nav py-3">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
                    <span class="brand-mark">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    Glexo
                </a>

                <div class="nav-actions ms-auto d-flex flex-wrap align-items-center gap-2">
                    {% if user.is_authenticated %}
                        <span class="nav-user me-lg-2">
                            <i class="fa-regular fa-circle-user me-1"></i>
                            {{ user.username }}
                        </span>
                        <a href="{% url 'history' %}" class="btn btn-outline-primary nav-action">
                            <i class="fa-solid fa-clock-rotate-left me-1"></i>
                            History
                        </a>
                        <a href="{% url 'logout' %}" class="btn btn-outline-danger nav-action">
                            <i class="fa-solid fa-arrow-right-from-bracket me-1"></i>
                            Logout
                        </a>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-primary nav-action">
                            <i class="fa-solid fa-arrow-right-to-bracket me-1"></i>
                            Login
                        </a>
                        <a href="{% url 'register' %}" class="btn btn-brand nav-action">
                            <i class="fa-solid fa-user-plus me-1"></i>
                            Register
                        </a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="content-wrap">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer py-4 mt-5">
            <div class="container d-flex flex-column flex-sm-row justify-content-between gap-2 small">
                <span>Glexo © 2026</span>
                <span>Fast document discovery for focused work</span>
            </div>
        </footer>
    </div>
</body>

</html>
