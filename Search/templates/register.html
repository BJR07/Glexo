{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <span class="icon-badge mx-auto mb-3">
                        <i class="fa-solid fa-user-plus"></i>
                    </span>
                    <h1 class="h2 fw-bold mb-1">Create account</h1>
                    <p class="text-muted-custom mb-0">Start saving searches and revisiting results faster.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-grid">
                        <button class="btn btn-brand" type="submit">
                            Register
                        </button>
                    </div>
                </form>

                <hr>

                <p class="text-center text-muted-custom mb-0">
                    Already have an account?
                    <a href="{% url 'login' %}" class="fw-bold text-decoration-none">Login</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
